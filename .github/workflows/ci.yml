name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-cpu.txt
            requirements/**/*.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-cpu.txt
          python -m pip install -r requirements/dev.txt

      - name: Environment and config check
        run: |
          python -m pip check
          python -m pip wheel . --no-deps --wheel-dir /tmp/specloc-wheel
          bash -n scripts/runCloudExperiment.sh tools/distTrain.sh
          bash scripts/runCloudExperiment.sh --help >/dev/null
          bash scripts/runCloudExperiment.sh --dry-run >/dev/null
          bash scripts/runCloudExperiment.sh --dataset aitod --dry-run >/dev/null
          specloc --version
          specloc info
          specloc doctor rsod --skip-data --allow-cpu
          specloc doctor aitod --skip-data --allow-cpu

      - name: Run unit tests
        run: |
          python -m ruff check src tests scripts tools
          python -m pytest tests/ -q
